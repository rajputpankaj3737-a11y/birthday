<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>🎉 Happy Birthday! 🎂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #ffd6e0, #f8bbd0 40%, #f48fb1 80%);
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.2rem;
            margin: 0;
            position: relative;
            overflow-x: hidden;
        }

        /* modern abstract shapes in background */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 80% 15%, rgba(255, 220, 240, 0.5) 5%, transparent 40%),
                        radial-gradient(circle at 10% 85%, rgba(255, 182, 193, 0.45) 8%, transparent 45%);
            pointer-events: none;
            z-index: 0;
        }

        /* elegant floating elements */
        .decor {
            position: absolute;
            user-select: none;
            pointer-events: none;
            z-index: 1;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.08));
        }

        .shape1 {
            top: 8%;
            right: 8%;
            font-size: 3.8rem;
            animation: gentleFloat 5.5s infinite alternate ease-in-out;
            opacity: 0.8;
        }

        .shape2 {
            bottom: 12%;
            left: 6%;
            font-size: 3.2rem;
            animation: gentleFloat 6.2s infinite alternate-reverse ease-in-out;
            opacity: 0.7;
        }

        .shape3 {
            top: 22%;
            left: 10%;
            font-size: 2.4rem;
            animation: spinSlow 7s infinite linear;
            opacity: 0.6;
        }

        .shape4 {
            bottom: 18%;
            right: 12%;
            font-size: 2.8rem;
            animation: gentleFloat 4.8s infinite alternate ease-in-out;
            opacity: 0.75;
        }

        .shape5 {
            top: 40%;
            right: 5%;
            font-size: 2rem;
            animation: pulse 3s infinite ease-in-out;
            opacity: 0.65;
        }

        @keyframes gentleFloat {
            0% {
                transform: translateY(0px) rotate(0deg);
            }
            100% {
                transform: translateY(-18px) rotate(5deg);
            }
        }

        @keyframes spinSlow {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.6;
            }
            50% {
                transform: scale(1.15);
                opacity: 0.9;
            }
            100% {
                transform: scale(1);
                opacity: 0.6;
            }
        }

        /* main card – glassmorphism modern style */
        .card {
            background: rgba(255, 250, 252, 0.7);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            background: linear-gradient(145deg, rgba(255, 248, 250, 0.75) 0%, rgba(255, 235, 242, 0.8) 100%);
            border-radius: 3.2rem;
            padding: 2.8rem 2rem;
            box-shadow: 0 30px 50px rgba(190, 70, 110, 0.25),
                        0 10px 25px rgba(160, 50, 80, 0.2),
                        inset 0 1px 10px rgba(255, 255, 255, 0.9);
            text-align: center;
            max-width: 420px;
            width: 100%;
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.7);
            transition: transform 0.25s ease, box-shadow 0.3s;
            margin: 0 auto;
        }

        .card:active {
            transform: scale(0.98);
        }

        /* modern typography */
        .cake-icon {
            font-size: 4.2rem;
            display: block;
            margin: 0 auto 0.5rem;
            filter: drop-shadow(0 10px 12px rgba(200, 100, 120, 0.4));
            animation: softBounce 2s infinite alternate;
        }

        @keyframes softBounce {
            0% {
                transform: translateY(0);
            }
            100% {
                transform: translateY(-10px);
            }
        }

        h1 {
            font-size: 2.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #c43a5e, #9e2a4a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            margin-bottom: 0.6rem;
            line-height: 1.2;
            text-shadow: 0 2px 5px rgba(255, 220, 230, 0.6);
        }

        .subhead {
            font-size: 1.1rem;
            font-weight: 500;
            color: #773d4c;
            background: rgba(255, 235, 242, 0.7);
            backdrop-filter: blur(5px);
            padding: 0.5rem 1.4rem;
            border-radius: 3rem;
            display: inline-block;
            margin: 0.8rem 0 1.4rem;
            letter-spacing: 0.3px;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .message {
            font-size: 1rem;
            color: #5a3341;
            margin: 1.2rem 0 1.8rem;
            line-height: 1.7;
            background: rgba(255, 245, 248, 0.6);
            backdrop-filter: blur(6px);
            padding: 0.9rem 1.2rem;
            border-radius: 2.2rem;
            font-weight: 450;
        }

        /* modern button – sleek and tappable */
        .gift-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            background: linear-gradient(125deg, #e8436e 0%, #c72c5a 100%);
            border: none;
            color: white;
            font-weight: 650;
            font-size: 1.4rem;
            padding: 1rem 2.2rem;
            border-radius: 4rem;
            text-decoration: none;
            box-shadow: 0 15px 25px -8px rgba(210, 40, 80, 0.5), 0 4px 10px rgba(0,0,0,0.08);
            letter-spacing: 0.4px;
            transition: all 0.25s ease;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 200, 210, 0.8);
            margin: 0.4rem 0 0.2rem;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .gift-link:hover {
            background: linear-gradient(125deg, #f5567c, #db3a64);
            box-shadow: 0 18px 28px -6px rgba(200, 30, 70, 0.6);
            transform: translateY(-3px);
        }

        .gift-link:active {
            transform: scale(0.96);
            box-shadow: 0 6px 12px rgba(180, 30, 60, 0.5);
        }

        .gift-emoji {
            font-size: 1.8rem;
            filter: drop-shadow(0 3px 3px rgba(0,0,0,0.15));
        }

        .footer-note {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #8f5b69;
            opacity: 0.85;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        /* mobile optimization */
        @media (max-width: 420px) {
            .card {
                padding: 2.2rem 1.4rem;
                border-radius: 2.5rem;
            }
            h1 {
                font-size: 2.4rem;
            }
            .cake-icon {
                font-size: 3.5rem;
            }
            .gift-link {
                font-size: 1.3rem;
                padding: 0.9rem 1.8rem;
            }
            .shape1 {
                font-size: 3rem;
            }
        }

        /* ensure touch targets are comfortable */
        .gift-link {
            min-height: 55px;
        }
    </style>
</head>
<body>
    <!-- Modern decorative elements -->
    <div class="decor shape1">✨</div>
    <div class="decor shape2">🎈</div>
    <div class="decor shape3">🌸</div>
    <div class="decor shape4">🎀</div>
    <div class="decor shape5">🧁</div>

    <main class="card">
        <span class="cake-icon" aria-hidden="true">🎂</span>
        
        <h1>Happy Birthday!</h1>
        
        <div class="subhead">
            ✦ celebrate in style ✦
        </div>
        
        <p class="message">
            Hope your day is as wonderful<br>
            and radiant as you are.<br>
            Here's to laughter, love, and<br>
            unforgettable moments.
        </p>

        <!-- Button directs to gift.html – no JavaScript function attached -->
        <a href="gift.html" class="gift-link" aria-label="Collect your birthday gift">
            <span class="gift-emoji">🎁</span> Collect Gift <span class="gift-emoji">🎁</span>
        </a>
        
        <div class="footer-note">
            tap to reveal your surprise
        </div>
    </main>
</body>
</html>
