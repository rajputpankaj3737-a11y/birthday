<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>💘 Heartbeat Thread • Cosmic Match</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      background: radial-gradient(ellipse at 50% 30%, #2e0a1a 0%, #150010 40%, #080010 100%);
      background-attachment: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.2rem;
      margin: 0;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 30% 20%, rgba(255, 180, 200, 0.06) 0%, transparent 50%),
        radial-gradient(circle at 70% 60%, rgba(255, 120, 160, 0.05) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    .stars-container {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--duration) infinite alternate ease-in-out;
      opacity: 0;
    }

    @keyframes twinkle {
      0% { opacity: 0.15; transform: scale(0.7); }
      100% { opacity: 0.9; transform: scale(1.2); }
    }

    .mystic {
      position: absolute;
      pointer-events: none;
      z-index: 1;
      user-select: none;
    }

    .mystic-1 {
      top: 6%;
      left: 8%;
      font-size: 2rem;
      animation: floatMystic 5s infinite alternate ease-in-out;
      filter: drop-shadow(0 0 8px rgba(255, 150, 200, 0.5));
    }

    .mystic-2 {
      bottom: 10%;
      right: 10%;
      font-size: 1.8rem;
      animation: floatMystic 6s infinite alternate-reverse ease-in-out;
      filter: drop-shadow(0 0 10px rgba(255, 120, 180, 0.5));
    }

    @keyframes floatMystic {
      0% { transform: translateY(0px) rotate(-2deg); }
      100% { transform: translateY(-15px) rotate(3deg); }
    }

    /* Main card layout */
    .card {
      background: rgba(25, 5, 18, 0.75);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      background: linear-gradient(165deg, rgba(35, 8, 25, 0.85) 0%, rgba(15, 3, 12, 0.9) 100%);
      border-radius: 2.5rem;
      padding: 2.2rem 1.8rem;
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.7),
                  0 0 50px rgba(255, 100, 150, 0.2),
                  inset 0 1px 0 rgba(255, 255, 255, 0.06);
      text-align: center;
      max-width: 500px;
      width: 100%;
      position: relative;
      z-index: 10;
      border: 1px solid rgba(255, 150, 180, 0.3);
      transition: all 0.4s ease;
    }

    .emperor-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255, 150, 180, 0.12);
      border: 1px solid rgba(255, 150, 180, 0.35);
      padding: 0.5rem 1.2rem;
      border-radius: 2rem;
      color: #ffb3c6;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(180deg, #ffb3c6 10%, #ff6b8a 50%, #e85070 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.8rem;
    }

    .names-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin: 1.8rem 0 1.2rem;
      position: relative;
      transition: gap 0.5s ease;
    }

    .name-field {
      flex: 1;
      text-align: left;
    }

    .name-field label {
      display: block;
      color: #e0a0b5;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 0.3rem;
      text-transform: uppercase;
    }

    .name-field input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 150, 180, 0.35);
      border-radius: 2rem;
      color: #f5c0d0;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: all 0.3s;
    }

    .name-field input:focus {
      border-color: rgba(255, 150, 180, 0.7);
      box-shadow: 0 0 18px rgba(255, 100, 150, 0.2);
    }

    /* Heart zone between fields */
    .heart-zone {
      position: relative;
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .central-heart {
      font-size: 2.8rem;
      filter: drop-shadow(0 0 20px #ff4d6d);
      transition: all 0.3s;
      z-index: 15;
    }

    .percentage-inside {
      position: absolute;
      font-weight: 800;
      font-size: 1rem;
      color: white;
      text-shadow: 0 0 12px black, 0 0 20px #ff1a4f;
      z-index: 16;
    }

    /* SVG threads */
    .threads-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 12;
    }

    .heartbeat-thread {
      fill: none;
      stroke: #ff7b9c;
      stroke-width: 2.2;
      stroke-linecap: round;
      filter: drop-shadow(0 0 10px #ff3864);
      animation: pulseThread 0.7s infinite alternate;
    }

    @keyframes pulseThread {
      0% { stroke: #ff9eb5; stroke-width: 2; }
      100% { stroke: #ff2d55; stroke-width: 3; filter: drop-shadow(0 0 18px #ff1a4f); }
    }

    .match-btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #e85070, #c73a5a);
      border: none;
      border-radius: 3rem;
      color: #fff;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      margin-top: 1rem;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(200, 60, 90, 0.35);
      font-family: inherit;
    }

    .match-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(220, 70, 100, 0.5);
      background: linear-gradient(135deg, #f06080, #d44565);
    }

    .match-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .result-details {
      margin-top: 1.3rem;
      background: rgba(255, 150, 180, 0.07);
      border-radius: 1.5rem;
      padding: 1rem 1.2rem;
      border: 1px solid rgba(255, 150, 180, 0.2);
      text-align: left;
      display: none;
    }

    .result-details.active {
      display: block;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 0.4rem 0;
      border-bottom: 1px solid rgba(255, 150, 180, 0.1);
      color: #e8c0d0;
      font-size: 0.9rem;
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      color: #e0a0b5;
    }

    .detail-value {
      color: #ffb3c6;
      font-weight: 600;
    }

    .compatibility-msg {
      color: #e8c0d0;
      font-size: 0.9rem;
      margin-top: 0.8rem;
      text-align: center;
      font-style: italic;
    }

    .back-link {
      display: inline-block;
      margin-top: 1.2rem;
      color: #d0a0b5;
      text-decoration: none;
      font-size: 0.85rem;
      opacity: 0.7;
    }

    .back-link:hover { opacity: 1; }

    @media (max-width: 450px) {
      .card { padding: 1.8rem 1.2rem; }
      .names-container { gap: 0.5rem; }
      .central-heart { font-size: 2.2rem; }
    }
  </style>
</head>
<body>
  <div class="stars-container" id="starsContainer"></div>
  <div class="mystic mystic-1">💘</div>
  <div class="mystic mystic-2">💝</div>

  <main class="card" id="mainCard">
    <div class="emperor-badge">👑 Supreme Emperor of Heaven</div>
    <h1>Partner Matchmaking</h1>
    <p style="color: #e0a0b5; font-size: 0.9rem; margin-bottom: 0.5rem;">Feel the heartbeat of destiny</p>

    <div class="names-container" id="namesContainer">
      <div class="name-field" id="yourField">
        <label>Your Name</label>
        <input type="text" id="yourName" placeholder="Your name..." autocomplete="off">
      </div>

      <div class="heart-zone" id="heartZone">
        <span class="central-heart" id="centralHeart">❤️</span>
        <span class="percentage-inside" id="percentageInside" style="display: none;">0%</span>
      </div>

      <div class="name-field" id="partnerField">
        <label>Partner's Name</label>
        <input type="text" id="partnerName" placeholder="Partner's name..." autocomplete="off">
      </div>
    </div>

    <button class="match-btn" id="matchBtn">💘 Check Compatibility</button>

    <div class="result-details" id="resultDetails">
      <div class="detail-row">
        <span class="detail-label">Love Connection</span>
        <span class="detail-value" id="loveVal"></span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Emotional Bond</span>
        <span class="detail-value" id="emotionalVal"></span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Communication</span>
        <span class="detail-value" id="commVal"></span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Long-term</span>
        <span class="detail-value" id="longVal"></span>
      </div>
      <div class="compatibility-msg" id="compatMsg"></div>
    </div>

    <a href="partner.html" class="back-link">← Back to Partner Prediction</a>
  </main>

  <svg class="threads-svg" id="threadsSvg" style="display: none;"></svg>

  <script>
    (function() {
      const container = document.getElementById('starsContainer');
      for (let i = 0; i < 50; i++) {
        const star = document.createElement('div');
        star.classList.add('star');
        const size = Math.random() * 2.5 + 1;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
        star.style.animationDelay = Math.random() * 4 + 's';
        container.appendChild(star);
      }
    })();

    const yourInput = document.getElementById('yourName');
    const partnerInput = document.getElementById('partnerName');
    const matchBtn = document.getElementById('matchBtn');
    const namesContainer = document.getElementById('namesContainer');
    const centralHeart = document.getElementById('centralHeart');
    const percentageInside = document.getElementById('percentageInside');
    const threadsSvg = document.getElementById('threadsSvg');
    const resultDetails = document.getElementById('resultDetails');
    
    const loveVal = document.getElementById('loveVal');
    const emotionalVal = document.getElementById('emotionalVal');
    const commVal = document.getElementById('commVal');
    const longVal = document.getElementById('longVal');
    const compatMsg = document.getElementById('compatMsg');

    function normalizeName(name) {
      return name.toLowerCase().replace(/\s+/g, ' ').trim();
    }

    function calculateCompatibility(name1, name2) {
      const n1 = normalizeName(name1);
      const n2 = normalizeName(name2);
      
      const rohitNames = ['rohit roshan', 'rohit roshan mohanty'];
      const kalpanaNames = ['kalpana', 's.kalpana', 's kalpana'];
      
      if (rohitNames.includes(n1) || rohitNames.includes(n2)) {
        const other = rohitNames.includes(n1) ? n2 : n1;
        if (other.charAt(0).toUpperCase() === 'S' || other.charAt(0).toUpperCase() === 'K') {
          return { score: 99, love: 'Perfect Match', emotional: 'Soul Bond', communication: 'Telepathic', longTerm: 'Forever', message: '✨ Divine match! S/K connection blessed by the Emperor. 💖' };
        }
      }
      if (kalpanaNames.includes(n1) || kalpanaNames.includes(n2)) {
        const other = kalpanaNames.includes(n1) ? n2 : n1;
        if (other.charAt(0).toUpperCase() === 'R') {
          return { score: 96, love: 'Deep Connection', emotional: 'Profound Bond', communication: 'Excellent', longTerm: 'Lifetime', message: '🌟 Kalpana & R-initial – a transformative love. 💖' };
        }
      }
      
      const sum1 = n1.split('').reduce((s, c) => s + c.charCodeAt(0), 0);
      const sum2 = n2.split('').reduce((s, c) => s + c.charCodeAt(0), 0);
      let baseScore = ((sum1 + sum2) * 7) % 35 + 60;
      baseScore = Math.min(94, Math.max(35, baseScore)); // min 35%
      
      let love, emotional, comm, long, msg;
      if (baseScore >= 85) {
        love = 'Exceptional'; emotional = 'Deeply Connected'; comm = 'Outstanding'; long = 'Soulmate Potential';
        msg = '💕 An extraordinary match! Your energies complement each other perfectly.';
      } else if (baseScore >= 75) {
        love = 'Strong'; emotional = 'Well-Matched'; comm = 'Very Good'; long = 'Excellent';
        msg = '💗 A wonderful connection with strong compatibility.';
      } else if (baseScore >= 60) {
        love = 'Promising'; emotional = 'Growing'; comm = 'Good'; long = 'Positive';
        msg = '💝 A promising match with room to grow.';
      } else {
        love = 'Developing'; emotional = 'Learning'; comm = 'Work in Progress'; long = 'Requires Effort';
        msg = '💔 This connection needs care, but every love story can bloom.';
      }
      return { score: baseScore, love, emotional, communication: comm, longTerm: long, message: msg };
    }

    function getElementCenter(el) {
      const rect = el.getBoundingClientRect();
      return { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
    }

    function drawThreads() {
      const yourCenter = getElementCenter(yourInput);
      const partnerCenter = getElementCenter(partnerInput);
      const heartCenter = getElementCenter(centralHeart);
      
      if (!yourCenter || !partnerCenter || !heartCenter) return;
      
      // Create wavy heartbeat path between two points
      function heartbeatPath(x1, y1, x2, y2) {
        const dx = x2 - x1;
        const dy = y2 - y1;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        const perpX = -dy / dist;
        const perpY = dx / dist;
        let d = `M ${x1},${y1}`;
        const segments = 5;
        for (let i = 1; i <= segments; i++) {
          const t = i / segments;
          let px = x1 + dx * t;
          let py = y1 + dy * t;
          const wave = Math.sin(i * 2.2) * 7 + (i === 3 ? -5 : i===4 ? 5 : 0);
          px += perpX * wave;
          py += perpY * wave;
          d += ` L ${px},${py}`;
        }
        return d;
      }

      const path1 = heartbeatPath(yourCenter.x, yourCenter.y, heartCenter.x, heartCenter.y);
      const path2 = heartbeatPath(partnerCenter.x, partnerCenter.y, heartCenter.x, heartCenter.y);
      
      threadsSvg.innerHTML = `
        <path class="heartbeat-thread" d="${path1}" />
        <path class="heartbeat-thread" d="${path2}" />
      `;
    }

    function updateThreadsAndHeart(percentage) {
      drawThreads();
      // Update heart appearance based on percentage
      if (percentage < 35) {
        centralHeart.textContent = '💔';
      } else {
        centralHeart.textContent = '❤️';
      }
      percentageInside.textContent = percentage + '%';
      percentageInside.style.display = 'block';
    }

    function startHeartbeatAnimation(percentage) {
      threadsSvg.style.display = 'block';
      // Expand gap slightly to make room for heart animation
      namesContainer.style.gap = '1.8rem';
      
      updateThreadsAndHeart(percentage);
      
      // Continuously update threads on resize/scroll
      window.addEventListener('resize', updateThreadsAndHeart.bind(null, percentage));
      window.addEventListener('scroll', updateThreadsAndHeart.bind(null, percentage));
      
      threadsSvg._cleanup = () => {
        window.removeEventListener('resize', updateThreadsAndHeart);
        window.removeEventListener('scroll', updateThreadsAndHeart);
      };
    }

    function stopHeartbeatAnimation() {
      threadsSvg.style.display = 'none';
      namesContainer.style.gap = '1rem';
      percentageInside.style.display = 'none';
      centralHeart.textContent = '❤️';
      if (threadsSvg._cleanup) {
        threadsSvg._cleanup();
        threadsSvg._cleanup = null;
      }
    }

    function showResultDetails(result) {
      loveVal.textContent = result.love;
      emotionalVal.textContent = result.emotional;
      commVal.textContent = result.communication;
      longVal.textContent = result.longTerm;
      compatMsg.textContent = result.message;
      resultDetails.classList.add('active');
    }

    matchBtn.addEventListener('click', () => {
      const yourName = yourInput.value.trim();
      const partnerName = partnerInput.value.trim();
      
      if (!yourName || !partnerName) {
        alert('Please enter both names.');
        return;
      }
      
      matchBtn.disabled = true;
      resultDetails.classList.remove('active');
      
      const result = calculateCompatibility(yourName, partnerName);
      
      // Start heartbeat animation with threads and heart
      startHeartbeatAnimation(result.score);
      
      // After 2.8 seconds, show result details and stop animation
      setTimeout(() => {
        stopHeartbeatAnimation();
        showResultDetails(result);
        matchBtn.disabled = false;
        // Keep heart with final percentage visible (static)
        centralHeart.textContent = result.score < 35 ? '💔' : '❤️';
        percentageInside.textContent = result.score + '%';
        percentageInside.style.display = 'block';
      }, 2800);
    });

    // Reset when typing new names
    yourInput.addEventListener('input', () => {
      if (resultDetails.classList.contains('active')) {
        resultDetails.classList.remove('active');
        stopHeartbeatAnimation();
      }
    });
    partnerInput.addEventListener('input', () => {
      if (resultDetails.classList.contains('active')) {
        resultDetails.classList.remove('active');
        stopHeartbeatAnimation();
      }
    });

  </script>
</body>
</html>
