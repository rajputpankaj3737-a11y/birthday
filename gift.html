<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>🎁 Supreme Emperor's Gift - Predict Your Future</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            background: radial-gradient(ellipse at 50% 30%, #1a0a2e 0%, #0d0015 40%, #020010 100%);
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.2rem;
            margin: 0;
            position: relative;
            overflow-x: hidden;
        }

        /* Celestial background glow */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 25% 20%, rgba(255, 215, 0, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 75% 65%, rgba(180, 130, 255, 0.05) 0%, transparent 55%),
                radial-gradient(circle at 50% 50%, rgba(255, 180, 100, 0.04) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* Stars container */
        .stars-container {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite alternate ease-in-out;
            opacity: 0;
        }

        @keyframes twinkle {
            0% { opacity: 0.15; transform: scale(0.7); }
            100% { opacity: 0.9; transform: scale(1.2); }
        }

        /* Floating mystical symbols */
        .mystic {
            position: absolute;
            pointer-events: none;
            z-index: 1;
            user-select: none;
        }

        .mystic-1 {
            top: 7%;
            left: 8%;
            font-size: 2.4rem;
            animation: floatMystic 5s infinite alternate ease-in-out;
            filter: drop-shadow(0 0 10px rgba(255, 200, 50, 0.5));
        }

        .mystic-2 {
            top: 12%;
            right: 10%;
            font-size: 2rem;
            animation: floatMystic 6s infinite alternate-reverse ease-in-out;
            filter: drop-shadow(0 0 12px rgba(200, 150, 255, 0.5));
        }

        .mystic-3 {
            bottom: 15%;
            left: 10%;
            font-size: 2.6rem;
            animation: floatMystic 4.5s infinite alternate ease-in-out;
            filter: drop-shadow(0 0 10px rgba(255, 180, 50, 0.6));
        }

        .mystic-4 {
            bottom: 20%;
            right: 12%;
            font-size: 2.1rem;
            animation: floatMystic 5.5s infinite alternate-reverse ease-in-out;
            filter: drop-shadow(0 0 12px rgba(255, 200, 100, 0.5));
        }

        .mystic-5 {
            top: 40%;
            left: 5%;
            font-size: 1.6rem;
            animation: pulseGlow 3s infinite ease-in-out;
            filter: drop-shadow(0 0 8px rgba(255, 220, 100, 0.6));
        }

        @keyframes floatMystic {
            0% {
                transform: translateY(0px) rotate(-2deg);
            }
            100% {
                transform: translateY(-18px) rotate(3deg);
            }
        }

        @keyframes pulseGlow {
            0%, 100% {
                transform: scale(1);
                opacity: 0.6;
            }
            50% {
                transform: scale(1.18);
                opacity: 1;
            }
        }

        /* Main card */
        .card {
            background: rgba(12, 4, 28, 0.75);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            background: linear-gradient(165deg, rgba(25, 8, 45, 0.8) 0%, rgba(8, 3, 20, 0.9) 100%);
            border-radius: 3rem;
            padding: 2.8rem 2rem;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.7),
                        0 0 50px rgba(200, 150, 40, 0.2),
                        inset 0 1px 0 rgba(255, 255, 255, 0.06);
            text-align: center;
            max-width: 450px;
            width: 100%;
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255, 215, 0, 0.25);
            transition: transform 0.3s ease;
        }

        .card:active {
            transform: scale(0.98);
        }

        /* Emperor crown icon */
        .crown-icon {
            font-size: 5rem;
            display: block;
            margin: 0 auto 0.5rem;
            animation: crownGlow 2.5s infinite alternate;
            filter: drop-shadow(0 0 25px rgba(255, 200, 0, 0.7));
        }

        @keyframes crownGlow {
            0% {
                filter: drop-shadow(0 0 18px rgba(255, 180, 0, 0.6));
            }
            100% {
                filter: drop-shadow(0 0 35px rgba(255, 220, 50, 0.95));
            }
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(180deg, #ffd700 10%, #ffaa00 50%, #cc8800 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.5px;
            margin-bottom: 0.4rem;
            line-height: 1.3;
        }

        .emperor-title {
            font-size: 0.9rem;
            color: #c9a860;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
            margin-bottom: 1rem;
        }

        .divider {
            width: 70px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ffd700, #ffaa00, #ffd700, transparent);
            margin: 0.8rem auto 1.2rem;
            border-radius: 5px;
        }

        .prediction-intro {
            font-size: 1.05rem;
            color: #d4c090;
            margin: 0.5rem 0 0.8rem;
            line-height: 1.8;
            font-weight: 400;
            background: rgba(255, 215, 0, 0.04);
            padding: 1rem 1.2rem;
            border-radius: 2rem;
            border: 1px solid rgba(255, 215, 0, 0.12);
        }

        .prediction-intro .highlight {
            color: #ffd700;
            font-weight: 700;
        }

        .success-rate {
            display: inline-block;
            background: rgba(255, 215, 0, 0.12);
            color: #ffd700;
            font-size: 0.85rem;
            padding: 0.4rem 1.1rem;
            border-radius: 2rem;
            margin: 0.8rem 0 1.5rem;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            font-weight: 500;
        }

        .question-text {
            font-size: 1.1rem;
            color: #e0d0b0;
            margin: 1.5rem 0 1.2rem;
            font-weight: 500;
        }

        /* Option buttons */
        .options {
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
            margin: 0.5rem 0 1rem;
        }

        .option-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            background: linear-gradient(135deg, rgba(35, 18, 55, 0.75), rgba(18, 8, 30, 0.85));
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: #f0d78c;
            font-weight: 600;
            font-size: 1.15rem;
            padding: 1.05rem 1.5rem;
            border-radius: 3.5rem;
            text-decoration: none;
            letter-spacing: 0.3px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.45);
        }

        .option-btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.08), transparent);
            transition: left 0.5s ease;
        }

        .option-btn:hover::before {
            left: 100%;
        }

        .option-btn:hover {
            background: linear-gradient(135deg, rgba(55, 28, 80, 0.85), rgba(30, 12, 50, 0.9));
            border-color: rgba(255, 200, 0, 0.65);
            color: #ffe9a0;
            box-shadow: 0 14px 35px rgba(200, 150, 20, 0.3), 0 0 30px rgba(255, 180, 0, 0.2);
            transform: translateY(-3px);
        }

        .option-btn:active {
            transform: scale(0.96);
        }

        .option-emoji {
            font-size: 1.8rem;
            filter: drop-shadow(0 0 6px rgba(255, 200, 0, 0.5));
        }

        .footer-note {
            margin-top: 1.3rem;
            font-size: 0.8rem;
            color: #8a7a60;
            opacity: 0.75;
            font-style: italic;
        }

        @media (max-width: 420px) {
            .card {
                padding: 2.2rem 1.3rem;
                border-radius: 2.5rem;
            }
            h1 {
                font-size: 1.7rem;
            }
            .option-btn {
                font-size: 1rem;
                padding: 0.9rem 1.2rem;
            }
            .crown-icon {
                font-size: 4rem;
            }
            .prediction-intro {
                font-size: 0.95rem;
                padding: 0.8rem 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Starfield background -->
    <div class="stars-container" id="starsContainer"></div>

    <!-- Mystical floating elements -->
    <div class="mystic mystic-1">🔮</div>
    <div class="mystic mystic-2">✨</div>
    <div class="mystic mystic-3">👑</div>
    <div class="mystic mystic-4">🌟</div>
    <div class="mystic mystic-5">💫</div>

    <main class="card">
        <span class="crown-icon" aria-hidden="true">👑</span>
        
        <h1>Supreme Emperor of Heaven</h1>
        <div class="emperor-title">✦ Ruler of Destiny ✦</div>
        
        <div class="divider"></div>
        
        <p class="prediction-intro">
            I am the <span class="highlight">Supreme Emperor of Heaven</span>.<br>
            I can predict your future with a<br>
            <span class="highlight">75% success rate</span>.
        </p>

        <div class="success-rate">
            ⚡ 75% Accuracy Guaranteed ⚡
        </div>

        <p class="question-text">
            What do you want to know?, Child of the destiny...
        </p>

        <div class="options">
            <!-- Career option leads to carrier.html -->
            <a href="carrier.html" class="option-btn">
                <span class="option-emoji">💼</span> Career
                <span class="option-emoji">📈</span>
            </a>

            <!-- Love partner option leads to partner.html -->
            <a href="partner.html" class="option-btn">
                <span class="option-emoji">💖</span> Love Partner
                <span class="option-emoji">💕</span>
            </a>
        </div>
        
        <div class="footer-note">
            The heavens await your choice...
        </div>
    </main>

    <script>
        // Generate twinkling stars
        (function() {
            const container = document.getElementById('starsContainer');
            const starCount = 60;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                
                const size = Math.random() * 2.8 + 1;
                const posX = Math.random() * 100;
                const posY = Math.random() * 100;
                const duration = Math.random() * 3 + 2;
                const delay = Math.random() * 4;
                
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = posX + '%';
                star.style.top = posY + '%';
                star.style.setProperty('--duration', duration + 's');
                star.style.animationDelay = delay + 's';
                
                container.appendChild(star);
            }
        })();
    </script>
</body>
</html>
